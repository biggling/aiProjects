# Claude Code Multi-Agent Crontab
# Install with: crontab /path/to/scripts/crontab.conf
#
# IMPORTANT: Set WORKSPACE_ROOT before installing.
# Replace /home/user/workspace with your actual workspace path.

WORKSPACE_ROOT=/home/user/workspace
SHELL=/bin/bash
PATH=/usr/local/bin:/usr/bin:/bin

# Morning research — all projects, staggered across 2 hours
# Runs at 08:00, exits when all projects are done (~2h for 12 projects with 90s gaps)
0 8 * * * $WORKSPACE_ROOT/scripts/run-research.sh all >> $WORKSPACE_ROOT/logs/cron-research.log 2>&1

# Evening work — priority 1 and 2 projects (your highest value work)
# Adjust project names to match your top priorities
0 20 * * * $WORKSPACE_ROOT/scripts/run-agent-continue.sh project-1 >> $WORKSPACE_ROOT/logs/cron-work.log 2>&1
30 20 * * * $WORKSPACE_ROOT/scripts/run-agent-continue.sh project-2 >> $WORKSPACE_ROOT/logs/cron-work.log 2>&1

# Weekly summary — Sunday morning
0 7 * * 0 $WORKSPACE_ROOT/scripts/weekly-summary.sh >> $WORKSPACE_ROOT/logs/cron-summary.log 2>&1

# Optional: run priority 3 project on weekdays only
# 0 21 * * 1-5 $WORKSPACE_ROOT/scripts/run-agent-continue.sh project-3 >> $WORKSPACE_ROOT/logs/cron-work.log 2>&1
