services:
  dashboard:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data

  worker:
    build: .
    command: celery -A celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    volumes:
      - ./data:/app/data

  beat:
    build: .
    command: celery -A celery_app beat --loglevel=info
    env_file: .env
    volumes:
      - ./data:/app/data
