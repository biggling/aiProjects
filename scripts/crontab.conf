# ============================================================
# Side Projects Crontab Schedule
# ============================================================
# Install: crontab < ~/aiProjects/scripts/crontab.conf
# Or add manually: crontab -e
#
# Schedule designed for Bangkok timezone (GMT+7)
# Two agent types:
#   run-research.sh  — morning, weekly per project (web search + analysis)
#   run-agent.sh     — evening, 1-2x/week per project (build work)
# ============================================================

# Set PATH so crontab can find claude binary and gtimeout (brew coreutils)
PATH=/Users/big/.local/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/Users/big/.npm-global/bin
SHELL=/bin/zsh

# Set home for claude config
HOME=/Users/big

# Base directory
PROJ=/Users/big/Library/Mobile Documents/com~apple~CloudDocs/Fastlane/github/aiProjects

# ============================================================
# RESEARCH SPRINT — Mar 22-31 only, top 6 projects, 2x daily
# Night batch: 22:00-00:30 | Morning batch: 04:00-06:30
# Note: android-app & micro-saas straddle midnight (00:00/00:30) — their
# morning run at 06:00/06:30 will be skipped on same calendar day.
# ============================================================

# — Night batch (spreads across midnight; 00:xx entries hit next calendar day)
0  22 22-31 3 * "$PROJ/scripts/run-research.sh" mcp-apps         >> "$PROJ/logs/cron.log" 2>&1
30 22 22-31 3 * "$PROJ/scripts/run-research.sh" digital-products >> "$PROJ/logs/cron.log" 2>&1
0  23 22-31 3 * "$PROJ/scripts/run-research.sh" trade-auto       >> "$PROJ/logs/cron.log" 2>&1
30 23 22-31 3 * "$PROJ/scripts/run-research.sh" pod              >> "$PROJ/logs/cron.log" 2>&1
0   0 22-31 3 * "$PROJ/scripts/run-research.sh" android-app      >> "$PROJ/logs/cron.log" 2>&1
30  0 22-31 3 * "$PROJ/scripts/run-research.sh" micro-saas       >> "$PROJ/logs/cron.log" 2>&1

# — Morning batch
0   4 22-31 3 * "$PROJ/scripts/run-research.sh" mcp-apps         >> "$PROJ/logs/cron.log" 2>&1
30  4 22-31 3 * "$PROJ/scripts/run-research.sh" digital-products >> "$PROJ/logs/cron.log" 2>&1
0   5 22-31 3 * "$PROJ/scripts/run-research.sh" trade-auto       >> "$PROJ/logs/cron.log" 2>&1
30  5 22-31 3 * "$PROJ/scripts/run-research.sh" pod              >> "$PROJ/logs/cron.log" 2>&1
0   6 22-31 3 * "$PROJ/scripts/run-research.sh" android-app      >> "$PROJ/logs/cron.log" 2>&1
30  6 22-31 3 * "$PROJ/scripts/run-research.sh" micro-saas       >> "$PROJ/logs/cron.log" 2>&1

# ============================================================
# RESEARCH AGENTS — Morning (08:00-10:00), runs before work sessions
# One run per week per project. Results available before evening session.
# ============================================================

# Monday: mcp-apps (P1) + digital-products (P2)
0 8 * * 1  "$PROJ/scripts/run-research.sh" mcp-apps         >> "$PROJ/logs/cron.log" 2>&1
0 9 * * 1  "$PROJ/scripts/run-research.sh" digital-products >> "$PROJ/logs/cron.log" 2>&1

# Tuesday: trade-auto (P3) + pod (P4)
0 8 * * 2  "$PROJ/scripts/run-research.sh" trade-auto       >> "$PROJ/logs/cron.log" 2>&1
0 9 * * 2  "$PROJ/scripts/run-research.sh" pod              >> "$PROJ/logs/cron.log" 2>&1

# Wednesday: android-app (P5) + micro-saas (P6)
0 8 * * 3  "$PROJ/scripts/run-research.sh" android-app      >> "$PROJ/logs/cron.log" 2>&1
0 9 * * 3  "$PROJ/scripts/run-research.sh" micro-saas       >> "$PROJ/logs/cron.log" 2>&1

# Thursday: tiktok (P7) + youtube-content (P8)
0 8 * * 4  "$PROJ/scripts/run-research.sh" tiktok           >> "$PROJ/logs/cron.log" 2>&1
0 9 * * 4  "$PROJ/scripts/run-research.sh" youtube-content  >> "$PROJ/logs/cron.log" 2>&1

# Saturday: shopee-affiliate (P9) + amazon-kdp (P10) + steam-game (P11)
0 8  * * 6 "$PROJ/scripts/run-research.sh" shopee-affiliate >> "$PROJ/logs/cron.log" 2>&1
0 9  * * 6 "$PROJ/scripts/run-research.sh" amazon-kdp       >> "$PROJ/logs/cron.log" 2>&1
0 10 * * 6 "$PROJ/scripts/run-research.sh" steam-game       >> "$PROJ/logs/cron.log" 2>&1

# Sunday: polymarket (P12)
0 8 * * 0  "$PROJ/scripts/run-research.sh" polymarket       >> "$PROJ/logs/cron.log" 2>&1

# ============================================================
# WORK AGENTS — Evening (19:00-21:00), after research is ready
# Top 4 get 2x/week. Others 1x/week.
# ============================================================

# ┌─ Priority 1: MCP Apps (2x/week)
0 19 * * 1 "$PROJ/scripts/run-agent.sh" mcp-apps         >> "$PROJ/logs/cron.log" 2>&1
0 19 * * 4 "$PROJ/scripts/run-agent.sh" mcp-apps         >> "$PROJ/logs/cron.log" 2>&1

# ┌─ Priority 2: Digital Products (2x/week)
0 20 * * 1 "$PROJ/scripts/run-agent.sh" digital-products >> "$PROJ/logs/cron.log" 2>&1
0 20 * * 4 "$PROJ/scripts/run-agent.sh" digital-products >> "$PROJ/logs/cron.log" 2>&1

# ┌─ Priority 3: Trade Automation (2x/week)
0 19 * * 2 "$PROJ/scripts/run-agent.sh" trade-auto       >> "$PROJ/logs/cron.log" 2>&1
0 19 * * 5 "$PROJ/scripts/run-agent.sh" trade-auto       >> "$PROJ/logs/cron.log" 2>&1

# ┌─ Priority 4: Print on Demand (2x/week)
0 20 * * 2 "$PROJ/scripts/run-agent.sh" pod              >> "$PROJ/logs/cron.log" 2>&1
0 20 * * 5 "$PROJ/scripts/run-agent.sh" pod              >> "$PROJ/logs/cron.log" 2>&1

# ┌─ Priority 5: Android App (1x/week)
0 19 * * 3 "$PROJ/scripts/run-agent.sh" android-app      >> "$PROJ/logs/cron.log" 2>&1

# ┌─ Priority 6: Micro-SaaS (1x/week)
0 21 * * 3 "$PROJ/scripts/run-agent.sh" micro-saas       >> "$PROJ/logs/cron.log" 2>&1

# ┌─ Priority 7: TikTok (1x/week)
0 20 * * 3 "$PROJ/scripts/run-agent.sh" tiktok           >> "$PROJ/logs/cron.log" 2>&1

# ┌─ Priority 8: YouTube Content (1x/week)
0 21 * * 5 "$PROJ/scripts/run-agent.sh" youtube-content  >> "$PROJ/logs/cron.log" 2>&1

# ┌─ Priority 9: Shopee Affiliate (1x/week — weekend)
0 14 * * 6 "$PROJ/scripts/run-agent.sh" shopee-affiliate >> "$PROJ/logs/cron.log" 2>&1

# ┌─ Priority 10: Amazon KDP (1x/week — weekend)
0 15 * * 6 "$PROJ/scripts/run-agent.sh" amazon-kdp       >> "$PROJ/logs/cron.log" 2>&1

# ┌─ Priority 11: Steam Game (1x/week — weekend)
0 14 * * 0 "$PROJ/scripts/run-agent.sh" steam-game       >> "$PROJ/logs/cron.log" 2>&1

# ┌─ Priority 12: Polymarket (disabled until Trade Auto hits Phase 3)
# 0 15 * * 0 "$PROJ/scripts/run-agent.sh" polymarket >> "$PROJ/logs/cron.log" 2>&1

# ============================================================
# MAINTENANCE
# ============================================================

# Clean logs older than 30 days — every Sunday midnight
0 0 * * 0 find "$PROJ/logs" -name "*.log" -mtime +30 -delete

# Weekly summary — Sunday 21:00
0 21 * * 0 "$PROJ/scripts/weekly-summary.sh" >> "$PROJ/logs/cron.log" 2>&1
