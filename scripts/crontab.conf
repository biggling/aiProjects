# ============================================================
# Side Projects Crontab Schedule
# ============================================================
# Install: crontab < ~/side-projects/scripts/crontab.conf
# Or add manually: crontab -e
#
# Schedule designed for Bangkok timezone (GMT+7)
# Total: ~4 sessions/week = fits < 5 hours budget
# ============================================================

# Set PATH so crontab can find claude binary
PATH=/usr/local/bin:/usr/bin:/bin:/home/big/.npm-global/bin

# Set home for claude config
HOME=/home/big

# ============================================================
# WEEKLY SCHEDULE — 6 projects, < 5 hours/week
# ============================================================
# Strategy: Top 2 projects get 2x/week, others get 1x/week
# Each session ~10 min (--print mode), review on phone via Telegram
# Stagger times to avoid overlap
# ============================================================

# ┌─ Priority 1: Trade Automation (2x/week — highest priority)
0 20 * * 1 ~/side-projects/scripts/run-agent.sh trade-auto >> ~/side-projects/logs/cron.log 2>&1
0 20 * * 4 ~/side-projects/scripts/run-agent.sh trade-auto >> ~/side-projects/logs/cron.log 2>&1

# ┌─ Priority 2: Print on Demand (1x/week)
0 20 * * 2 ~/side-projects/scripts/run-agent.sh pod >> ~/side-projects/logs/cron.log 2>&1

# ┌─ Priority 3: Shopee Affiliate (1x/week)
0 20 * * 3 ~/side-projects/scripts/run-agent.sh shopee-affiliate >> ~/side-projects/logs/cron.log 2>&1

# ┌─ Priority 4: Amazon KDP (1x/week — weekend)
0 14 * * 6 ~/side-projects/scripts/run-agent.sh amazon-kdp >> ~/side-projects/logs/cron.log 2>&1

# ┌─ Priority 5: Steam Game (1x/week — weekend, needs longer focus)
0 14 * * 0 ~/side-projects/scripts/run-agent.sh steam-game >> ~/side-projects/logs/cron.log 2>&1

# ┌─ Priority 6: Android App (1x/week — weekend)
0 16 * * 6 ~/side-projects/scripts/run-agent.sh android-app >> ~/side-projects/logs/cron.log 2>&1

# ┌─ Priority 7: Polymarket (disabled until Trade Auto hits Phase 3)
# │  Uncomment when ready:
# 0 14 * * 0 ~/side-projects/scripts/run-agent.sh polymarket >> ~/side-projects/logs/cron.log 2>&1

# ============================================================
# MAINTENANCE
# ============================================================

# Clean logs older than 30 days — every Sunday midnight
0 0 * * 0 find ~/side-projects/logs -name "*.log" -mtime +30 -delete

# Weekly summary — Sunday 21:00
# Sends a digest of all project statuses to Telegram
0 21 * * 0 ~/side-projects/scripts/weekly-summary.sh >> ~/side-projects/logs/cron.log 2>&1
