# ============================================================
# Side Projects Crontab Schedule
# ============================================================
# Install: crontab < ~/aiProjects/scripts/crontab.conf
# Or add manually: crontab -e
#
# Schedule designed for Bangkok timezone (GMT+7)
# Total: ~8 sessions/week = fits < 5 hours budget
# ============================================================

# Set PATH so crontab can find claude binary
PATH=/usr/local/bin:/usr/bin:/bin:/Users/big/.npm-global/bin
SHELL=/bin/zsh

# Set home for claude config
HOME=/Users/big

# Base directory
PROJ=~/Library/Mobile\ Documents/com~apple~CloudDocs/Fastlane/github/aiProjects

# ============================================================
# WEEKLY SCHEDULE — 8 projects, < 5 hours/week
# ============================================================
# Strategy: Top 3 projects get 2x/week, others get 1x/week
# Each session ~10 min (--print mode), review on phone via Telegram
# Stagger times to avoid overlap
# ============================================================

# ┌─ Priority 1: TikTok (2x/week — most built out, closest to revenue)
0 19 * * 1 "$PROJ/scripts/run-agent.sh" tiktok >> "$PROJ/logs/cron.log" 2>&1
0 19 * * 4 "$PROJ/scripts/run-agent.sh" tiktok >> "$PROJ/logs/cron.log" 2>&1

# ┌─ Priority 2: Trade Automation (2x/week — code-heavy, runs unattended)
0 20 * * 1 "$PROJ/scripts/run-agent.sh" trade-auto >> "$PROJ/logs/cron.log" 2>&1
0 20 * * 4 "$PROJ/scripts/run-agent.sh" trade-auto >> "$PROJ/logs/cron.log" 2>&1

# ┌─ Priority 3: Print on Demand (2x/week — closest to revenue)
0 20 * * 2 "$PROJ/scripts/run-agent.sh" pod >> "$PROJ/logs/cron.log" 2>&1
0 20 * * 5 "$PROJ/scripts/run-agent.sh" pod >> "$PROJ/logs/cron.log" 2>&1

# ┌─ Priority 4: Shopee Affiliate (1x/week)
0 20 * * 3 "$PROJ/scripts/run-agent.sh" shopee-affiliate >> "$PROJ/logs/cron.log" 2>&1

# ┌─ Priority 5: Amazon KDP (1x/week — weekend)
0 14 * * 6 "$PROJ/scripts/run-agent.sh" amazon-kdp >> "$PROJ/logs/cron.log" 2>&1

# ┌─ Priority 6: Steam Game (1x/week — weekend, needs longer focus)
0 14 * * 0 "$PROJ/scripts/run-agent.sh" steam-game >> "$PROJ/logs/cron.log" 2>&1

# ┌─ Priority 7: Android App (1x/week — weekend)
0 16 * * 6 "$PROJ/scripts/run-agent.sh" android-app >> "$PROJ/logs/cron.log" 2>&1

# ┌─ Priority 8: Polymarket (disabled until Trade Auto hits Phase 3)
# │  Uncomment when ready:
# 0 14 * * 0 "$PROJ/scripts/run-agent.sh" polymarket >> "$PROJ/logs/cron.log" 2>&1

# ============================================================
# MAINTENANCE
# ============================================================

# Clean logs older than 30 days — every Sunday midnight
0 0 * * 0 find "$PROJ/logs" -name "*.log" -mtime +30 -delete

# Weekly summary — Sunday 21:00
# Sends a digest of all project statuses to Telegram
0 21 * * 0 "$PROJ/scripts/weekly-summary.sh" >> "$PROJ/logs/cron.log" 2>&1
