# aiProjects scheduler config
# -------------------------------------------------------
# format:  type  project  [ai]  [hint]  HH:MM [HH:MM ...]
# types:   research | work | continue | subwork
#
# ai    (optional): claude | gemini — per-entry AI override
#                   if omitted, falls back to AI_CLI env var or claude
# hint  (optional, subwork only):
#         @plan.md / @AGENT.md — read file from subdir as instructions
#         auto-detect if omitted: AGENT.md → plan.md → continue.md
#
# Field order: ai and hint can appear in any order after project.
# Times are always identified by HH:MM pattern.
#
# Examples:
#   research  mcp-apps           23:00  01:30          # default AI
#   research  digital-products   gemini  23:30         # use gemini
#   work      trade-auto         claude  20:00         # explicit claude
#   subwork   tiktok/modules     @AGENT.md  21:00      # auto AI, with file
#   subwork   trade-auto/src     gemini  @plan.md  20:00  # gemini + file
# -------------------------------------------------------
#
#research    mcp-apps          gemini 23:00  01:30
#research    digital-products  gemini 23:30  02:00
#research    pod               gemini 00:00  02:30
#research    android-app       gemini 00:30  03:00
#research    micro-saas        gemini 01:00  03:30
