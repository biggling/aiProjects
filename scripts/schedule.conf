# aiProjects scheduler config
# -------------------------------------------------------
# format:  type      project           HH:MM  [HH:MM ...]
# types:   research | work | continue | subwork
#
# subwork: runs agent with CWD set to project/subdir
#   format:  subwork  project/subdir           HH:MM
#   with file hint:
#            subwork  project/subdir  @plan.md  HH:MM
#            subwork  project/subdir  @AGENT.md HH:MM
#   with inline prompt (quote not required in conf):
#            subwork  project/subdir  "do X"    HH:MM
#   auto-detect (no hint): looks for AGENT.md → plan.md → continue.md
#
# Examples:
#   subwork  trade-auto/src          20:00             # auto-detect
#   subwork  tiktok/modules  @AGENT.md  21:00          # use AGENT.md
#   subwork  tiktok/modules  @plan.md   21:00          # use plan.md
# -------------------------------------------------------

research    mcp-apps          23:00  01:30
research    digital-products  23:30  02:00
research    pod               00:00  02:30
research    android-app       00:30  03:00
research    micro-saas        01:00  03:30
